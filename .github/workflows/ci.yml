name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: MCP smoke
        run: npm run smoke:mcp

      - name: Codex config smoke
        run: npm run smoke:codex-config

      - name: Runtime smoke
        run: npm run smoke:runtime

      - name: Pack manifest check
        run: npm run pack:check

      - name: Diff check
        run: git --no-pager diff --check
